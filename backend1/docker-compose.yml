version: '3.8'

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: rebellion_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: rebellion_store
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - rebellion_network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rebellion_backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/rebellion_store?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-override-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rebellion_network
    healthcheck:
      test: curl -f http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: node:20-alpine
    container_name: rebellion_frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - rebellion_network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  rebellion_network:
    driver: bridge
